# ========================================================================
# CONFIGURACIÓN NGINX PARA DESARROLLO (LOCALHOST)
# ========================================================================
# Este archivo permite tanto frontend como backend funcionar correctamente
# con subdominios tenant en localhost sin romper nada.
#
# Uso:
#   sudo cp dev.localhost.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/dev.localhost.conf /etc/nginx/sites-enabled/
#   sudo systemctl restart nginx
#
# Accesos:
#   Frontend:   http://localhost:3000  (directo)
#               http://localhost (via nginx)
#               http://cliente1.localhost (via nginx)
#   Backend:    http://localhost:8000 (directo)
#               http://localhost/api (via nginx)
# ========================================================================

# ========================================================================
# 1. BLOQUE UPSTREAM - Backend Django en puerto 8001
# ========================================================================
upstream django_backend {
    server 127.0.0.1:8001;
}

# ========================================================================
# 2. BLOQUE UPSTREAM - Frontend React en puerto 3000
# ========================================================================
upstream react_frontend {
    server 127.0.0.1:3000;
}

# ========================================================================
# 3. REDIRECCIÓN HTTP -> HTTPS (SOLO PARA PRODUCCIÓN)
# En desarrollo, omitimos esto
# ========================================================================
# server {
#     listen 80;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

# ========================================================================
# 4. SERVIDOR MAIN - Maneja TODOS los dominios (*.localhost)
# ========================================================================
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    
    # Acepta localhost, *.localhost, y variantes
    server_name localhost *.localhost;
    
    # Límite de tamaño de cuerpo (importante para subidas)
    client_max_body_size 100M;
    
    # Directorio raíz (no es crítico en proxy inverso, pero ayuda)
    root /var/www/ecommerce;
    
    # ====================================================================
    # 4.1 UBICACIÓN: /api/* -> Backend Django
    # ====================================================================
    location /api/ {
        proxy_pass http://django_backend/api/;
        
        # Headers esenciales para que Django reconozca requests de proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Importante: Preservar el subdominio tenant
        proxy_set_header Host $http_host;
        
        # Timeout para operaciones largas
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # No redirigir si hay errores
        proxy_redirect off;
    }
    
    # ====================================================================
    # 4.2 UBICACIÓN: /admin/* -> Backend Django
    # ====================================================================
    location /admin/ {
        proxy_pass http://django_backend/admin/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header Host $http_host;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_redirect off;
    }
    
    # ====================================================================
    # 4.3 UBICACIÓN: Static files backend (CSS, JS, imágenes)
    # ====================================================================
    location /static/ {
        proxy_pass http://django_backend/static/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache estático por 30 días
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # ====================================================================
    # 4.4 UBICACIÓN: Media files backend (Uploads)
    # ====================================================================
    location /media/ {
        proxy_pass http://django_backend/media/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # ====================================================================
    # 4.5 UBICACIÓN: / -> Frontend React (Default)
    # ====================================================================
    location / {
        proxy_pass http://react_frontend/;
        
        # Headers necesarios para React Dev Server
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # WebSocket support (si usa hot reload)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # No cachear HTML de React
        proxy_cache_bypass $http_upgrade;
        proxy_no_cache $http_upgrade;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # ====================================================================
    # 4.6 Manejo de errores
    # ====================================================================
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}
