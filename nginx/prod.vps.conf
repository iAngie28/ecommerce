# ========================================================================
# CONFIGURACIÓN NGINX PARA PRODUCCIÓN (VPS) - ESTABILIZADA
# ========================================================================

# ========================================================================
# 1. UPSTREAMS
# ========================================================================
upstream django_backend {
    server 127.0.0.1:8001;
    keepalive 32;
}

upstream react_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ========================================================================
# 2. SERVIDOR PRINCIPAL
# ========================================================================
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    
    server_name 157.173.102.129 ~^(?<subdomain>.+)\.157\.173\.102\.129\.nip\.io$;
    
    client_max_body_size 100M;
    
    # Logs (Asegúrate de que /var/log/nginx/ sea escribible)
    access_log /var/log/nginx/ecommerce_access.log combined;
    error_log /var/log/nginx/ecommerce_error.log warn;
    
    # ====================================================================
    # 3. REGLAS DE ENRUTAMIENTO (ORDEN CRÍTICO)
    # ====================================================================

    # 3.1 Backend: API
    location /api/ {
        proxy_pass http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # 3.2 Backend: Admin de Django
    location /admin/ {
        proxy_pass http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    # 3.3 Backend: Archivos de Medios (Uploads)
    location /media/ {
        proxy_pass http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
    }
    
    # 3.4 ARCHIVOS ESTÁTICOS ESPECIALES (Django Admin Assets)
    # Si la petición viene de la ruta de admin, la mandamos a Django
    location /static/admin/ {
        proxy_pass http://django_backend;
    }

    # 3.5 FRONTEND: Todo lo demás (Incluye el /static/ de React)
    # IMPORTANTE: Al no haber un bloque /static/ general, las peticiones
    # de React a /static/js/main.js caerán aquí y llegarán al servidor de
    # producción de React (puerto 3000) correctamente.
    location / {
        proxy_pass http://react_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Soporte WebSocket (HMR/Recarga si fuera necesaria)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_read_timeout 86400;
    }
}
