# ========================================================================
# CONFIGURACIÓN NGINX PARA PRODUCCIÓN (VPS) 
# ========================================================================

# 1. UPSTREAM BACKEND (Django)
upstream django_backend {
    server 127.0.0.1:8001;
    keepalive 32;
}

# 2. SERVIDOR ÚNICO
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    
    # Nombre del servidor (IP y subdominios nip.io)
    server_name 157.173.102.129 ~^(?<subdomain>.+)\.157\.173\.102\.129\.nip\.io$;
    
    # RUTA AL BUILD DE REACT (Nginx servirá esto directamente)
    # El script nginx_config.py reemplazará esta ruta por la absoluta real
    root {{PROJECT_ROOT}}/frontend/build;
    index index.html;
    
    client_max_body_size 100M;
    
    # Logs
    access_log /var/log/nginx/ecommerce_access.log combined;
    error_log /var/log/nginx/ecommerce_error.log warn;
    
    # ====================================================================
    # 3. REGLAS DE ENRUTAMIENTO (ORDEN POR PRIORIDAD)
    # ====================================================================

    # 3.1 BACKEND: API, Admin y Media (Proxy a Django)
    location ~ ^/(api|admin|media)/ {
        proxy_pass http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    # 3.2 BACKEND STATIC (Django Admin CSS/JS)
    location /static/admin/ {
        proxy_pass http://django_backend;
    }

    # 3.3 FRONTEND: Archivos con Hash (Optimización de Caché)
    # Estos archivos NUNCA cambian, podemos cachearlos agresivamente
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    # 3.4 FRONTEND: Todo lo demás (React SPA routing)
    # Si el archivo existe lo entrega, si no, entrega index.html para que React lo maneje
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
