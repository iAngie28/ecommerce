# ========================================================================
# CONFIGURACIÓN NGINX PARA PRODUCCIÓN (VPS)
# ========================================================================
# Este archivo configura nginx en producción para que maneje:
# - HTTP (sin SSL/HTTPS - se agregará después cuando tengas dominio)
# - Proxy inverso para Django y React
# - Compresión y caché de assets
#
# NOTA IMPORTANTE:
# Actualmente funciona SOLO con IP del VPS (ej: 45.33.44.55)
# Acceso: http://45.33.44.55
#
# CUANDO TENGAS DOMINIO:
# 1. Cambiar listen 80 a listen 443 ssl
# 2. Agregar certificado SSL Let's Encrypt
# 3. Agregar redirect 80 -> 443
#
# ANTES DE USAR:
# 1. Reemplaza TU_IP_VPS con la IP del tu servidor (ej: 45.33.44.55)
# 2. Copia este archivo a: /etc/nginx/sites-available/prod.vps.conf
# 3. Habilita: sudo ln -s /etc/nginx/sites-available/prod.vps.conf /etc/nginx/sites-enabled/
# 4. Reinicia nginx: sudo systemctl restart nginx
# ========================================================================

# ========================================================================
# VARIABLES A PERSONALIZAR (BUSCA Y REEMPLAZA ANTES DE USAR)
# ========================================================================
# TU_IP_VPS -> 45.33.44.55 (ejemplo)
# ========================================================================

# ========================================================================
# 1. UPSTREAM - Backend Django
# ========================================================================
upstream django_backend {
    server 127.0.0.1:8001;
    keepalive 32;
}

# ========================================================================
# 2. UPSTREAM - Frontend React
# ========================================================================
upstream react_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ========================================================================
# 3. SERVIDOR HTTP MAIN (Puerto 80)
# ========================================================================
# NOTA: No incluye HTTPS. Cuando tengas dominio, agregar SSL aquí
# ========================================================================
server {
    listen 80;
    listen [::]:80;
    
    # Aceptar la IP del VPS
    server_name TU_IP_VPS;
    
    # Permitir cualquier IP (ya que puede cambiar)
    # Si agregas dominio después, cambiar esto a: server_name empresa.com *.empresa.com;
    
    # ====================================================================
    # SEGURIDAD GENERAL
    # ====================================================================
    client_max_body_size 100M;
    
    # Prevenir clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # ====================================================================
    # LOGGING
    # ====================================================================
    access_log /var/log/nginx/ecommerce_access.log combined;
    error_log /var/log/nginx/ecommerce_error.log warn;
    
    # ====================================================================
    # 4.4 COMPRESIÓN GZIP
    # ====================================================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml+rss
               application/json application/javascript image/svg+xml;
    gzip_disable "MSIE [1-6]\.";
    
    # ====================================================================
    # 4.5 CACHÉ (importante para assets estáticos)
    # ====================================================================
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=ecommerce_cache:10m max_size=1g inactive=60m;
    
    # ====================================================================
    # 4.6 RULESET: /api/* -> Backend Django
    # ====================================================================
    location /api/ {
        proxy_pass http://django_backend;
        proxy_http_version 1.1;
        
        # Headers esenciales
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Importante para Django + tenants
        proxy_set_header Host $http_host;
        
        # Connection management
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # No redirigir
        proxy_redirect off;
        
        # No cachear respuestas API
        proxy_cache_bypass 1;
    }
    
    # ====================================================================
    # 4.7 RULESET: /admin/* -> Backend Django
    # ====================================================================
    location /admin/ {
        proxy_pass http://django_backend;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header Host $http_host;
        
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_redirect off;
        
        # Requiere autenticación en nginx (opcional)
        # auth_basic "Admin Panel";
        # auth_basic_user_file /etc/nginx/.htpasswd;
    }
    
    # ====================================================================
    # 4.8 RULESET: /static/* -> Backend Django (Assets estáticos)
    # ====================================================================
    location /static/ {
        proxy_pass http://django_backend;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Caché de static files por 30 días
        expires 30d;
        add_header Cache-Control "public, immutable" always;
        
        proxy_cache ecommerce_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1d;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        add_header X-Cache-Status $upstream_cache_status;
    }
    
    # ====================================================================
    # 4.9 RULESET: /media/* -> Backend Django (Uploads)
    # ====================================================================
    location /media/ {
        proxy_pass http://django_backend;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache media por 7 días
        expires 7d;
        add_header Cache-Control "public" always;
    }
    
    # ====================================================================
    # 4.10 RULESET: / -> Frontend React (Default)
    # ====================================================================
    location / {
        proxy_pass http://react_frontend;
        proxy_http_version 1.1;
        
        # Headers para React
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # WebSocket (si es necesario)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # No cachear HTML
        proxy_cache_bypass $http_upgrade;
        proxy_no_cache $http_upgrade;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
